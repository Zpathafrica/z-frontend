<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZPath — A guide into private money</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Editorial paper + ink + single rust accent */
    --paper:        #ECE6D8;   /* warm bone */
    --paper-2:      #E2DBC9;   /* paper, slightly deeper */
    --paper-3:      #D6CDB7;   /* deepest paper for dividers */
    --ink:          #0E0E0C;   /* near-black, warm */
    --ink-2:        #1A1A17;
    --ink-soft:     #2A2925;
    --mute:         #6B665B;   /* warm muted */
    --mute-2:       #8B8676;
    --rust:         #B95220;   /* single warm accent — used sparingly */
    --rust-2:       #934018;
    --rust-soft:    #E2C2A8;
    --paper-on-dark:#EDE7D9;
    --hair:         rgba(14,14,12,0.12);
    --hair-soft:    rgba(14,14,12,0.06);
    --hair-on-dark: rgba(237,231,217,0.10);
    --wa:           #25D366;  /* WhatsApp green — intentional, only on WA CTA */
    --wa-2:         #1FB659;
  }

  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  ::selection { background: var(--ink); color: var(--paper); }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    overflow-x: hidden;
    font-feature-settings: 'ss01', 'ss03', 'cv11';
  }

  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'tnum'; }

  h1, h2, h3, h4 { margin: 0; font-weight: 600; font-family: 'Manrope', sans-serif; }
  h1 {
    font-weight: 600;
    font-size: clamp(40px, 6.4vw, 84px);
    line-height: 1.02;
    letter-spacing: -0.038em;
    text-wrap: balance;
  }
  h2 {
    font-weight: 600;
    font-size: clamp(30px, 4vw, 52px);
    line-height: 1.08;
    letter-spacing: -0.032em;
    text-wrap: balance;
  }
  h3 {
    font-size: 18px;
    line-height: 1.3;
    font-weight: 600;
    letter-spacing: -0.018em;
  }
  h4 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  p { margin: 0; }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--mute);
  }
  .label-rust { color: var(--rust); }
  .accent { color: var(--rust); font-weight: 600; }

  .container { max-width: 1200px; margin: 0 auto; padding: 0 48px; }
  @media (max-width: 767px) { .container { padding: 0 24px; } }

  section { padding: 112px 0; }
  section.tight { padding: 80px 0; }
  @media (max-width: 767px) { section { padding: 72px 0; } section.tight { padding: 48px 0; } }

  .section-paper { background: var(--paper); color: var(--ink); }
  .section-paper-2 { background: var(--paper-2); color: var(--ink); }
  .section-ink { background: var(--ink); color: var(--paper-on-dark); }
  .section-rust { background: var(--rust); color: var(--paper-on-dark); }

  .rule { height: 1px; background: var(--hair); width: 100%; }
  .rule-on-dark { background: var(--hair-on-dark); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 10px;
    padding: 0 22px; height: 48px;
    border-radius: 999px;
    font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; border: none;
    transition: background 180ms ease, transform 120ms ease, color 180ms ease, border-color 180ms ease;
    text-decoration: none; white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .btn:active { transform: scale(0.98); }
  .btn-wa { background: var(--wa); color: #fff; }
  .btn-wa:hover { background: var(--wa-2); }
  .btn-wa-lg { height: 54px; padding: 0 26px; font-size: 14px; }
  .btn-ink { background: var(--ink); color: var(--paper); }
  .btn-ink:hover { background: var(--ink-2); }
  .btn-ghost-ink { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
  .btn-ghost-ink:hover { background: var(--ink); color: var(--paper); }
  .btn-paper { background: var(--paper); color: var(--ink); }
  .btn-paper:hover { background: var(--paper-2); }
  .btn-sm { height: 36px; padding: 0 14px; font-size: 12.5px; }

  /* Nav */
  nav.topnav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(236,230,216,0.82);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    height: 60px;
    display: flex; align-items: center;
    border-bottom: 1px solid transparent;
    transition: border-color 200ms ease;
  }
  nav.topnav.scrolled { border-bottom: 1px solid var(--hair); }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .nav-links { display: flex; align-items: center; gap: 36px; }
  .nav-links a { color: var(--ink); text-decoration: none; font-size: 13px; font-weight: 500; letter-spacing: -0.005em; }
  .nav-links a:hover { color: var(--rust); }
  .nav-links a.btn { color: var(--paper); }
  .nav-links a.btn:hover { color: var(--paper); }
  .nav-links a.btn-paper, .nav-links a.btn-ghost-ink { color: var(--ink); }
  .nav-links a.btn-ghost-ink:hover { color: var(--paper); }
  .logo-mark {
    font-family: 'Manrope', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.04em;
    color: var(--ink);
    line-height: 1;
    display: inline-flex; align-items: center;
    text-decoration: none;
    gap: 0;
  }
  .logo-mark:hover { color: var(--ink-soft); }
  .logo-mark .dot { color: var(--rust); }
  .logo-mark .zmark {
    display: inline-block;
    width: 0.58em;
    height: 0.74em;
    color: currentColor;
    margin-right: 0.04em;
    margin-top: -0.04em;
    flex-shrink: 0;
  }
  .hamburger { display: none; background: none; border: none; color: var(--ink); padding: 8px; cursor: pointer; }
  @media (max-width: 900px) {
    .nav-links a:not(.btn) { display: none; }
    .hamburger { display: block; }
  }
  .mobile-menu {
    position: fixed; inset: 0; z-index: 200;
    background: var(--paper);
    display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
    gap: 24px;
    padding: 80px 32px;
    transform: translateY(-100%);
    transition: transform 320ms ease;
  }
  .mobile-menu.open { transform: translateY(0); }
  .mobile-menu a { color: var(--ink); font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 28px; text-decoration: none; line-height: 1.0; letter-spacing: -0.03em; }
  .mobile-menu a:hover { color: var(--rust); }
  .mobile-menu .close { position: absolute; top: 24px; right: 24px; background: none; border: none; color: var(--ink); padding: 8px; cursor: pointer; }

  .hero { padding: 32px 0 64px; min-height: calc(100vh - 60px); display: flex; align-items: center; position: relative; }
  @media (max-width: 767px) { .hero { padding: 24px 0 56px; min-height: auto; } }
  .hero-meta-row { display: none; }

  .hero-grid {
    display: grid;
    grid-template-columns: 1.15fr 0.95fr;
    gap: 64px;
    align-items: center;
    width: 100%;
  }
  @media (max-width: 1023px) {
    .hero-grid { grid-template-columns: 1fr; gap: 56px; }
    .hero-right { order: 2; }
  }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--mute);
    margin-bottom: 28px;
  }
  .hero-eyebrow::before {
    content: ''; width: 24px; height: 1px; background: var(--rust);
  }
  .hero-eyebrow .live {
    color: var(--rust);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .hero-eyebrow .live::before {
    content: ''; width: 6px; height: 6px; background: var(--rust); border-radius: 50%;
    box-shadow: 0 0 0 0 rgba(185,82,32, 0.5);
    animation: livePulse 2.2s ease-out infinite;
  }
  @keyframes livePulse {
    0% { box-shadow: 0 0 0 0 rgba(185,82,32, 0.4); }
    70% { box-shadow: 0 0 0 8px rgba(185,82,32, 0); }
    100% { box-shadow: 0 0 0 0 rgba(185,82,32, 0); }
  }
  .hero h1 { font-size: clamp(36px, 5.4vw, 68px); line-height: 1.04; letter-spacing: -0.04em; }
  .hero-bottom { display: contents; }
  .hero-right { display: flex; justify-content: flex-end; align-items: center; }
  @media (max-width: 1023px) { .hero-right { justify-content: center; } }
  .hero-left { max-width: 560px; }

  /* Bottom-of-hero divider */
  .hero-divider {
    margin-top: 64px;
    padding-top: 22px;
    border-top: 1px solid var(--hair);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 767px) {
    .hero-divider { grid-template-columns: 1fr 1fr; gap: 20px 16px; }
  }
  .hero-stat {
    display: flex; flex-direction: column; gap: 4px;
  }
  .hero-stat .v {
    font-family: 'Manrope', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.022em;
    line-height: 1;
  }
  .hero-stat .v .accent { color: var(--rust); }
  .hero-stat .k {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--mute);
  }
  .meta-dot { width: 6px; height: 6px; background: var(--rust); border-radius: 50%; }
  .hero h1 .accent {
    color: var(--rust);
  }
  .hero-bottom {
    /* Sub-grid hidden — inherits via display: contents */
  }
  .hero-body {
    font-size: 17px;
    line-height: 1.55;
    max-width: 480px;
    color: var(--ink-soft);
    font-weight: 400;
    letter-spacing: -0.008em;
    margin-top: 28px;
  }
  .hero-body strong { color: var(--ink); font-weight: 600; }
  .hero-ctas {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 32px;
    flex-wrap: wrap;
  }
  .hero-arrow-link {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--ink); text-decoration: none;
    font-size: 13px;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 2px;
    transition: color 180ms ease, border-color 180ms ease;
  }
  .hero-arrow-link:hover { color: var(--rust); border-color: var(--rust); }
  .hero-meta {
    margin-top: 18px;
    font-size: 12px;
    color: var(--mute);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .hero-meta .mono { color: var(--ink-soft); }

  /* Phone — refined, realistic */
  .phone-wrap { display: flex; justify-content: flex-end; align-items: center; perspective: 1200px; }
  @media (max-width: 1023px) { .phone-wrap { justify-content: center; } }
  .phone {
    width: 300px;
    background: #0a0a08;
    border-radius: 40px;
    padding: 9px;
    box-shadow:
      0 1px 0 1px rgba(255,255,255,0.04) inset,
      0 -1px 0 1px rgba(0,0,0,0.6) inset,
      0 30px 60px -20px rgba(14,14,12,0.32),
      0 16px 32px -12px rgba(14,14,12,0.16);
    position: relative;
  }
  @media (max-width: 480px) { .phone { width: 280px; } }
  /* Side buttons for realism */
  .phone::before {
    content: ''; position: absolute; left: -2px; top: 110px;
    width: 3px; height: 32px; background: #0a0a08; border-radius: 2px 0 0 2px;
  }
  .phone::after {
    content: ''; position: absolute; left: -2px; top: 160px;
    width: 3px; height: 56px; background: #0a0a08; border-radius: 2px 0 0 2px;
    box-shadow: 0 70px 0 #0a0a08;
  }
  .phone .side-r {
    position: absolute; right: -2px; top: 140px;
    width: 3px; height: 80px; background: #0a0a08; border-radius: 0 2px 2px 0;
  }
  .phone-screen {
    background: #DDD5BF;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
    aspect-ratio: 9 / 19.2;
    display: flex; flex-direction: column;
  }
  .phone-notch {
    position: absolute; top: 9px; left: 50%; transform: translateX(-50%);
    width: 92px; height: 26px; background: #0a0a08; border-radius: 14px;
    z-index: 5;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 14px;
    gap: 5px;
  }
  .phone-notch::after {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: #1a1a18;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04);
  }
  /* Status bar */
  .status-bar {
    height: 44px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 26px 0 22px;
    font-family: 'Manrope', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--ink);
    background: var(--paper);
    flex-shrink: 0;
    position: relative; z-index: 4;
  }
  .status-bar .sb-left { padding-top: 4px; letter-spacing: -0.01em; }
  .status-bar .sb-right { display: inline-flex; align-items: center; gap: 6px; padding-top: 4px; }
  .sb-icon { width: 14px; height: 10px; }
  .sb-battery {
    width: 22px; height: 11px;
    border: 1.2px solid var(--ink);
    border-radius: 3px;
    position: relative;
    padding: 1px;
  }
  .sb-battery::after {
    content: ''; position: absolute; right: -3px; top: 3px;
    width: 2px; height: 5px; background: var(--ink); border-radius: 0 1px 1px 0;
  }
  .sb-battery-fill { width: 75%; height: 100%; background: var(--ink); border-radius: 1px; }

  /* Chat header */
  .chat-header {
    background: var(--paper);
    color: var(--ink);
    padding: 8px 16px 14px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--hair);
    flex-shrink: 0;
  }
  .chat-avatar {
    width: 36px; height: 36px;
    background: var(--ink);
    color: var(--paper);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 15px;
    line-height: 1;
    position: relative;
    flex-shrink: 0;
  }
  .chat-avatar::after {
    content: ''; position: absolute; bottom: 0; right: 0;
    width: 10px; height: 10px; border-radius: 50%;
    background: #2BB85C;
    border: 2px solid var(--paper);
  }
  .chat-meta-name { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; }
  .chat-meta-sub { font-size: 11px; color: var(--mute); margin-top: 1px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em; }

  /* Chat body */
  .chat-body {
    padding: 18px 14px 14px;
    display: flex; flex-direction: column; gap: 10px;
    background: #DDD5BF;
    background-image:
      radial-gradient(rgba(14,14,12,0.025) 1px, transparent 1px);
    background-size: 12px 12px;
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .chat-date {
    align-self: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--mute);
    background: rgba(237,231,217,0.7);
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .bubble {
    max-width: 82%;
    padding: 9px 12px 7px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.42;
    position: relative;
    word-break: break-word;
    box-shadow: 0 1px 1px rgba(14,14,12,0.04);
  }
  .bubble.bot { background: var(--paper); color: var(--ink); align-self: flex-start; border-bottom-left-radius: 4px; }
  .bubble.bot::before {
    content: ''; position: absolute; bottom: 0; left: -6px;
    width: 10px; height: 10px;
    background: var(--paper);
    clip-path: polygon(100% 0, 100% 100%, 0 100%);
  }
  .bubble.bot + .bubble.bot { margin-top: -4px; }
  .bubble.bot + .bubble.bot::before { display: none; }
  .bubble.user { background: var(--ink); color: var(--paper); align-self: flex-end; border-bottom-right-radius: 4px; }
  .bubble.user::before {
    content: ''; position: absolute; bottom: 0; right: -6px;
    width: 10px; height: 10px;
    background: var(--ink);
    clip-path: polygon(0 0, 100% 100%, 0 100%);
  }
  .bubble.warn { background: var(--paper); color: var(--ink); border: 1px solid var(--rust); }
  .bubble.warn::before { display: none; }
  .bubble .time {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 9.5px; color: var(--mute); margin-left: 8px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
    float: right; margin-top: 2px;
  }
  .bubble.user .time { color: rgba(237,231,217,0.5); }
  .bubble.sw .sw-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--rust); margin-right: 6px; padding: 1px 5px;
    background: rgba(185,82,32,0.12); border-radius: 3px;
    vertical-align: middle; letter-spacing: 0.06em;
    font-weight: 500;
  }
  .bubble .warn-label {
    display: inline-flex; align-items: center; gap: 5px;
    font-weight: 500; font-size: 10px; color: var(--rust);
    margin-bottom: 6px; letter-spacing: 0.1em; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }
  .bubble .warn-label::before {
    content: ''; width: 6px; height: 6px; background: var(--rust); border-radius: 50%;
  }
  /* Typing bubble */
  .bubble.typing-bubble {
    padding: 11px 14px;
    display: inline-flex; gap: 4px; align-items: center; align-self: flex-start;
    background: var(--paper);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 1px rgba(14,14,12,0.04);
    border-radius: 14px;
  }
  .bubble.typing-bubble span {
    width: 6px; height: 6px; background: var(--mute); border-radius: 50%;
    animation: blink 1.3s infinite;
  }
  .bubble.typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
  .bubble.typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes blink { 0%, 60%, 100% { opacity: 0.25; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-1px); } }

  /* Input bar at bottom */
  .chat-input-bar {
    background: var(--paper);
    border-top: 1px solid var(--hair);
    padding: 10px 14px 18px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .chat-input-field {
    flex: 1;
    background: var(--paper-2);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--mute);
    font-family: 'Manrope', sans-serif;
    display: flex; align-items: center; justify-content: space-between;
  }
  .chat-input-field .placeholder { font-size: 12px; }
  .chat-input-send {
    width: 32px; height: 32px;
    background: var(--ink);
    color: var(--paper);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }
  .chat-home-bar {
    position: absolute;
    bottom: 6px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 4px;
    background: var(--ink); border-radius: 999px;
    opacity: 0.85;
    z-index: 6;
  }

  /* Marquee trust strip */
  .trust-strip {
    border-top: 1px solid var(--hair);
    border-bottom: 1px solid var(--hair);
    padding: 20px 0;
    overflow: hidden;
    position: relative;
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
    mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
    background: var(--paper);
  }
  .trust-track {
    display: flex;
    align-items: center;
    gap: 48px;
    width: max-content;
    animation: marquee 60s linear infinite;
    will-change: transform;
    transform: translate3d(0,0,0);
    backface-visibility: hidden;
  }
  .trust-strip:hover .trust-track { animation-play-state: paused; }
  @keyframes marquee {
    from { transform: translate3d(0, 0, 0); }
    to { transform: translate3d(-50%, 0, 0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .trust-track { animation: none; }
  }
  .trust-item {
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    letter-spacing: -0.012em;
    color: var(--ink);
    display: inline-flex; align-items: center; gap: 14px;
    white-space: nowrap;
    flex-shrink: 0;
    font-weight: 500;
  }
  .trust-item::before {
    content: '';
    width: 4px; height: 4px;
    background: var(--rust);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section-head {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 56px;
    margin-bottom: 72px;
    align-items: end;
  }

  .layer-num {

    font-weight: 400;

  /* Personas — minimal index list */

  .persona-num { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--rust-soft); letter-spacing: 0.06em; }
  .persona-title { font-family: 'Manrope', sans-serif; font-weight: 500; font-size: 28px; line-height: 1.1; color: var(--paper-on-dark); letter-spacing: -0.028em; }
  .persona-row p { color: rgba(237,231,217,0.86); font-size: 15px; max-width: 50ch; font-weight: 300; line-height: 1.55; }

  /* Safety */
  .safety-quote {
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: clamp(20px, 2.4vw, 30px);
    line-height: 1.3;
    letter-spacing: -0.024em;
    max-width: 36ch;
    color: var(--ink);
    margin: 24px 0 56px;
  }
  .safety-quote .accent { color: var(--rust); font-weight: 600; }
  .safety-quote .strike { text-decoration: line-through; text-decoration-color: var(--rust); text-decoration-thickness: 2px; }

  .safety-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border-top: 1px solid var(--hair);
    border-bottom: 1px solid var(--hair);
  }
  @media (max-width: 1023px) { .safety-grid { grid-template-columns: 1fr; } }
  .safety-cell {
    padding: 48px 40px 48px 0;
    border-right: 1px solid var(--hair);
  }
  .safety-cell:not(:first-child) { padding-left: 40px; }
  .safety-cell:last-child { border-right: none; padding-right: 0; }
  @media (max-width: 1023px) {
    .safety-cell { padding: 36px 0; border-right: none; border-bottom: 1px solid var(--hair); }
    .safety-cell:not(:first-child) { padding-left: 0; }
    .safety-cell:last-child { border-bottom: none; }
  }
  .safety-cell .label { display: block; margin-bottom: 22px; }
  .safety-cell h3 {
    font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 18px;
    line-height: 1.3; margin-bottom: 12px; letter-spacing: -0.02em;

  .safety-cell a { color: var(--ink); font-size: 13.5px; text-decoration: none; border-bottom: 1px solid var(--rust); padding-bottom: 2px; display: inline-block; margin-top: 22px; font-weight: 500; }
  .safety-cell a:hover { color: var(--rust); }

  .scam-warn {

    text-transform: uppercase;

  /* Community */
  .comm-list { display: flex; flex-direction: column; margin-bottom: 64px; }
  .comm-row {
    display: grid;
    grid-template-columns: 60px 1.2fr 2fr auto;
    gap: 32px;
    padding: 24px 0;
    border-top: 1px solid var(--hair);
    align-items: baseline;
    text-decoration: none;
    color: inherit;
    transition: padding 240ms ease;
  }
  .comm-list .comm-row:last-child { border-bottom: 1px solid var(--hair); }
  .comm-row:hover { padding-left: 16px; }
  .comm-row:hover .comm-arrow { transform: translateX(6px); color: var(--rust); }

    .comm-row { grid-template-columns: 50px 1fr auto; gap: 16px; }

  .comm-name { font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 18px; line-height: 1.25; letter-spacing: -0.022em; }
  .comm-url { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--mute); }
  .comm-arrow { color: var(--ink); transition: transform 240ms ease, color 240ms ease; font-size: 22px; line-height: 1; }

  .ea-block {
    border: 1px solid var(--ink);

    padding: 56px;
    display: grid; grid-template-columns: 1fr auto; gap: 32px; align-items: end;
  }
  @media (max-width: 767px) { .ea-block { padding: 32px; grid-template-columns: 1fr; } }
  .ea-block h3 {
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: clamp(20px, 2.4vw, 26px);

    max-width: 24ch;
    margin-bottom: 8px;
    letter-spacing: -0.024em;
  }
  .ea-block .sub { font-size: 15px; color: var(--ink-soft); max-width: 44ch; font-weight: 300; }
  .ea-buttons { display: flex; gap: 12px; flex-wrap: wrap; }

  /* FAQ */
  .faq-list { display: flex; flex-direction: column; max-width: 920px; margin: 0 auto; }

  .faq-item.open { padding-left: 0; }
  .faq-q {
    width: 100%; background: none; border: none;
    color: var(--paper-on-dark);
    text-align: left;
    font-family: 'Manrope', sans-serif;
    font-size: clamp(16px, 1.6vw, 19px);
    font-weight: 600;
    line-height: 1.35;

    letter-spacing: -0.018em;

  .faq-q .q-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--rust-soft); letter-spacing: 0.12em; flex-shrink: 0; padding-top: 8px; min-width: 24px; }
  .faq-q .q-text { flex: 1; }
  .faq-q .chev { color: var(--rust-soft); font-size: 18px; line-height: 1; transition: transform 320ms ease; flex-shrink: 0; padding-top: 6px; }
  .faq-q .q-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--rust-soft); letter-spacing: 0.12em; flex-shrink: 0; padding-top: 12px; min-width: 30px; }
  .faq-q .q-text { flex: 1; }
  .faq-q .chev { color: var(--rust-soft); font-size: 24px; line-height: 1; transition: transform 320ms ease; flex-shrink: 0; padding-top: 12px; }
  .faq-item.open .chev { transform: rotate(45deg); color: var(--rust); }

  .faq-item.open .faq-a-wrap { max-height: 500px; }
  .faq-a {
    color: rgba(237,231,217,0.85);
    font-size: 14.5px;

    letter-spacing: -0.005em;

  .final-cta {
    padding: 112px 0;
    text-align: left;
  }
  @media (max-width: 767px) { .final-cta { padding: 64px 0; } }
  .final-cta-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 56px;
    align-items: end;
  }
  @media (max-width: 1023px) { .final-cta-grid { grid-template-columns: 1fr; gap: 36px; } }
  .final-cta h2 {
    font-size: clamp(36px, 5.6vw, 72px);
    line-height: 1.05;
    color: var(--paper-on-dark);
    letter-spacing: -0.038em;
    font-weight: 600;
  }
  .final-cta h2 .accent { color: var(--rust); opacity: 1; font-weight: 600; }
  .final-cta .lede {
    font-size: 15px;
    color: rgba(237,231,217,0.86);
    margin-bottom: 22px;
    max-width: 44ch;
    font-weight: 400;
    line-height: 1.55;
  }
  .final-cta .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(237,231,217,0.5);
    margin-top: 20px;
    letter-spacing: 0.08em;
  }

  /* Footer */
  footer {
    background: var(--paper);
    color: var(--ink);
    padding: 88px 0 36px;
    border-top: 1px solid var(--hair);
  }
  .footer-top {
    display: grid;
    grid-template-columns: 1.8fr 1fr 1fr 1fr;
    gap: 56px;
    padding-bottom: 56px;
    border-bottom: 1px solid var(--hair);
    margin-bottom: 28px;
  }
  @media (max-width: 900px) { .footer-top { grid-template-columns: 1fr 1fr; gap: 40px; } .footer-brand { grid-column: span 2; } }
  @media (max-width: 480px) { .footer-top { grid-template-columns: 1fr; gap: 32px; } .footer-brand { grid-column: span 1; } }
  .footer-brand .tagline {
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 18px;
    line-height: 1.3;
    margin: 16px 0;
    max-width: 20ch;
    letter-spacing: -0.02em;
  }
  .footer-brand .tagline .accent { color: var(--rust); }

  /* Social icons */
  .socials {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-top: 20px;
    margin-left: -8px;
  }
  .socials a {
    width: 36px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%;
    color: var(--mute);
    text-decoration: none;
    transition: color 180ms ease, background 180ms ease, transform 180ms ease;
  }
  .socials a:hover {
    color: var(--rust);
    background: rgba(185,82,32,0.08);
    transform: translateY(-1px);
  }
  .socials svg { display: block; }
  .footer-col h5 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--mute);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin: 0 0 16px;
    font-weight: 400;
  }
  .footer-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
  .footer-col a { color: var(--ink-soft); text-decoration: none; font-size: 13.5px; letter-spacing: -0.005em; }
  .footer-col a:hover { color: var(--rust); }
  .footer-bar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--mute);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
    flex-wrap: wrap; gap: 16px;
  }
  .lang-toggle { display: inline-flex; align-items: center; gap: 2px; }
  .lang-toggle button {
    background: none; border: none; color: var(--mute); padding: 6px 12px;
    font-size: 12px; font-family: 'JetBrains Mono', monospace; cursor: pointer;
    letter-spacing: 0.06em;
    border-radius: 4px;
    transition: color 180ms ease, background 180ms ease;
  }
  .lang-toggle button.active { background: var(--ink); color: var(--paper); }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(16px); transition: opacity 700ms ease, transform 700ms cubic-bezier(0.22, 1, 0.36, 1); }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; } }

  /* Misc */
  :focus-visible { outline: 2px solid var(--rust); outline-offset: 3px; border-radius: 2px; }
  .wa-icon-wrap { display: inline-flex; }
  .wa-icon-wrap.pulse svg { animation: pulseScale 4s ease-in-out infinite; transform-origin: center; }
  @keyframes pulseScale {
    0%, 92%, 100% { transform: scale(1); }
    96% { transform: scale(1.18); }
  }

  /* Inline arrow used in many CTAs */
  .arr {
    display: inline-block;
    transition: transform 200ms ease;
  }
  .btn:hover .arr, a:hover .arr { transform: translateX(3px); }

  /* ─────────────────────────────────────────────
     TWEAKS — MOOD (palette variants)
     ───────────────────────────────────────────── */
  body[data-mood="midnight"] {
    --paper:         #0F0F0D;
    --paper-2:       #1A1A17;
    --paper-3:       #26241F;
    --ink:           #EDE7D9;
    --ink-2:         #DCD5C5;
    --ink-soft:      #B8B1A2;
    --mute:          #877F70;
    --mute-2:        #6F6859;
    --rust:          #E08043;
    --rust-2:        #C46A2E;
    --rust-soft:     #C46A2E;
    --paper-on-dark: #0F0F0D;
    --hair:          rgba(237,231,217,0.10);
    --hair-soft:     rgba(237,231,217,0.06);
    --hair-on-dark:  rgba(14,14,12,0.10);
  }
  body[data-mood="midnight"] nav.topnav {
    background: rgba(15,15,13,0.78);
  }
  body[data-mood="midnight"] .section-ink {
    background: #1F1E1A;
  }
  body[data-mood="midnight"] .section-paper-2 {
    background: #161613;
  }
  body[data-mood="midnight"] .phone {
    background: #050504;
  }
  body[data-mood="midnight"] .phone-notch,
  body[data-mood="midnight"] .phone::before,
  body[data-mood="midnight"] .phone::after,
  body[data-mood="midnight"] .phone .side-r { background: #050504; }
  body[data-mood="midnight"] .phone-screen { background: #1A1A17; }
  body[data-mood="midnight"] .status-bar { background: var(--paper); }
  body[data-mood="midnight"] .chat-header { background: var(--paper); }
  body[data-mood="midnight"] .chat-body {
    background: #1A1A17;
    background-image: radial-gradient(rgba(237,231,217,0.04) 1px, transparent 1px);
    background-size: 12px 12px;
  }
  body[data-mood="midnight"] .chat-input-bar { background: var(--paper); }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}

}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

function Reveal({ children, delay = 0 }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {setTimeout(() => setVisible(true), delay);obs.disconnect();}
    }, { threshold: 0.12 });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [delay]);
  return <div ref={ref} className={"reveal" + (visible ? " visible" : "")}>{children}</div>;
}

// ─────────────────────────────────────────────────────────
// Tweaks
// ─────────────────────────────────────────────────────────
function ZPathTweaks() {
  const [t, setTweak] = useTweaks(window.TWEAK_DEFAULTS);

  useEffect(() => {
    document.body.setAttribute('data-mood', t.mood);
    document.body.setAttribute('data-voice', t.voice);
    document.body.setAttribute('data-cadence', t.cadence);
  }, [t.mood, t.voice, t.cadence]);

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Mood" />
      <TweakColor
        label="Palette"
        value={t.mood === 'bone' ? ['#ECE6D8', '#0E0E0C', '#B95220'] :
        t.mood === 'midnight' ? ['#0F0F0D', '#EDE7D9', '#E08043'] :
        t.mood === 'cream' ? ['#F4EFE2', '#1F2316', '#B95220'] :
        ['#E8E6E1', '#0C0C0C', '#D63E1A']}
        options={[
        ['#ECE6D8', '#0E0E0C', '#B95220'],
        ['#0F0F0D', '#EDE7D9', '#E08043'],
        ['#F4EFE2', '#1F2316', '#B95220'],
        ['#E8E6E1', '#0C0C0C', '#D63E1A']]
        }
        onChange={(arr) => {
          const key = arr[0] === '#ECE6D8' ? 'bone' :
          arr[0] === '#0F0F0D' ? 'midnight' :
          arr[0] === '#F4EFE2' ? 'cream' :
          'carbon';
          setTweak('mood', key);
        }} />
      

      <TweakSection label="Voice" />
      <TweakRadio
        label="Typography"
        value={t.voice}
        options={['editorial', 'direct', 'quiet']}
        onChange={(v) => setTweak('voice', v)} />
      

      <TweakSection label="Cadence" />
      <TweakRadio
        label="Scale"
        value={t.cadence}
        options={['dense', 'standard', 'loose']}
        onChange={(v) => setTweak('cadence', v)} />
      
    </TweaksPanel>);

}
